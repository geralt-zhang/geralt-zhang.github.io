<!DOCTYPE html>
<html>
<body>
<h3>Test External MD</h3>
<div class="reveal"><div class="slides" id="slides-test"></div></div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/theme/white.css">
<style>.reveal{height:400px;border:1px solid #ddd}.reveal ul,.reveal h2{margin:0.5em 0}.reveal .controls .navigate-left.highlight,.reveal .controls .navigate-right.highlight{animation:none!important;opacity:.9}</style>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/markdown/markdown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
var src = "/static/slides/gemina.md";
var container = document.getElementById('slides-test');
console.log('Fetching:', src);
fetch(src).then(function(r) { return r.text(); }).then(function(t) {
  var lines = t.split('\n---\n');
  lines.forEach(function(content) {
    var section = document.createElement('section');
    section.setAttribute('data-markdown', '');
    var textarea = document.createElement('textarea');
    textarea.setAttribute('data-template', '');
    textarea.textContent = content.trim();
    section.appendChild(textarea);
    container.appendChild(section);
  });
  console.log('Created', lines.length, 'slides');
  setTimeout(function(){
    if (!window._revealInited) {
      Reveal.initialize({embedded:true,transition:'none',plugins:[RevealMarkdown]});
      window._revealInited = 1;
      console.log('Reveal initialized');
    }
  }, 200);
}).catch(function(e) { console.error('Error:', e); });
</script>
</body>
</html>
